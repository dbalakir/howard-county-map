<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Howard County MD — Lots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>
<div id="toolbar">
  <span id="title">Howard County MD — Residential Lots</span>

  <label>Min acres: <span id="acreVal">1</span>
    <input type="range" id="acreFilter" min="1" max="20" step="0.5" value="1">
  </label>

  <label>Show:
    <select id="typeFilter">
      <option value="all">All lots</option>
      <option value="vacant">Vacant only</option>
      <option value="improved">Improved only</option>
    </select>
  </label>

  <label>Zone:
    <select id="districtFilter">
      <option value="all">All districts</option>
    </select>
  </label>

  <label class="toggle-label">
    <input type="checkbox" id="hideRestricted" checked>
    Hide restricted zones
  </label>

  <label class="toggle-label">
    <input type="checkbox" id="zoningToggle">
    Zoning overlay
  </label>

  <span id="stats">Showing <b id="visCount">…</b> lots</span>
</div>
<div id="map"></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
